<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JZ BASEBALL TEAM - STARTING LINEUP V25</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');

        body { font-family: '微軟正黑體', Arial, sans-serif; background: #111; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start; min-height: 100vh; color: #fff; }

        #capture-area {
            width: 1080px; height: auto; 
            background-color: #000;
            display: flex; position: relative; overflow: visible;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }

        .left-panel { 
            width: 60%; padding: 20px 20px 20px 25px; z-index: 10; 
            background: linear-gradient(to right, #001529 90%, transparent);
            display: flex; flex-direction: column; 
            position: relative;
            overflow: hidden;
        }

        .watermark-logo {
            position: absolute; 
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; height: auto;
            opacity: 0.09;
            z-index: 0;
            pointer-events: none;
        }

        .left-panel > *:not(.watermark-logo) {
            position: relative; z-index: 2;
        }

        .right-panel { 
            width: 40%; 
            background-image: url('https://lh3.googleusercontent.com/d/1UfvVaUAMRQ3EXtYLQQjOvvFGv8zmk0PN'); 
            background-size: cover; 
            background-position: right bottom; 
            background-repeat: no-repeat;
            position: relative;
        }

        .vertical-text {
            position: absolute; top: 10px; right: 15px;
            font-family: 'Oswald', sans-serif; font-size: 16px; color: #B388FF;
            text-transform: uppercase; letter-spacing: 5px;
            writing-mode: vertical-rl; text-orientation: mixed;
            z-index: 15; text-shadow: 1px 1px 2px #000;
        }

        .header-title { font-family: 'Oswald', sans-serif; font-size: 43px; font-style: italic; color: #fff; margin: -5px 0 5px 0; line-height: 1; letter-spacing: 2px; text-shadow: 4px 4px 0 #4A148C; }
        
        .game-info-grid { 
            display: grid; 
            grid-template-columns: 1.25fr 1.05fr 0.9fr; 
            gap: 12px; padding-bottom: 10px; 
            border-bottom: 2px solid rgba(255,255,255,0.3); margin-bottom: 15px; 
        }
        .info-cell { display: flex; align-items: center; gap: 8px; }
        .info-cell:nth-child(3n+2), .info-cell:nth-child(3n+3) {
            border-left: 2px solid rgba(255,255,255,0.2);
            padding-left: 10px;
        }
        
        .game-info-grid input, .game-info-grid select { 
            background: transparent; border: none; color: #B89947; font-size: 16px; font-weight: bold; outline: none; cursor: pointer; width: 100%;
        }

        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1) brightness(2);
            cursor: pointer; opacity: 1;
        }

        .roster-split {
            display: grid; 
            grid-template-columns: 1.25fr 1.05fr 0.9fr; 
            gap: 12px; flex: 1;
        }
        
        .starters-col { grid-column: 1 / span 2; display: flex; flex-direction: column; }
        .bench-col { grid-column: 3; display: flex; flex-direction: column; }

        .lineup-list { display: flex; flex-direction: column; gap: 7px; }
        
        .lineup-row { 
            display: grid; 
            grid-template-columns: 1.25fr 1.05fr; 
            gap: 12px; 
            align-items: center; 
        } 
        
        .starter-left-col {
            display: flex; align-items: center; gap: 16px; 
        }
        
        .starter-right-col {
            display: flex; align-items: center;
            padding-left: 2px; 
        }

        .order-num { 
            font-family: 'Oswald', sans-serif; font-size: 24px; font-style: italic; color: #fff; 
            width: 38px; min-width: 38px; flex-shrink: 0; 
            text-align: center; text-shadow: 2px 2px 0 #673AB7; 
        }
        
        .sp-num { 
            color: #B388FF; font-size: 24px; 
        }

        .pos-box { 
            background: #4A148C; color: #fff; font-family: 'Oswald', sans-serif; 
            font-size: 24px; 
            width: 50px; height: 34px; 
            display: flex; justify-content: center; align-items: center; 
            transform: skewX(-10deg); border-left: 3px solid #B89947; 
        }
        .pos-box span { transform: skewX(10deg); }
        .pos-select-hidden { position: absolute; opacity: 0; width: 50px; height: 34px; cursor: pointer; z-index: 5; }

        /* 🌟 核心修正：加入超大右側內距 (20px) 與溢出設定，徹底消滅右側裁切問題 🌟 */
        .player-select { 
            -webkit-appearance: none; -moz-appearance: none; appearance: none; 
            background: transparent; border: none; 
            color: #fff; font-size: 24px; font-weight: bold; cursor: pointer; outline: none; 
            width: 100%; 
            text-shadow: 2px 2px 4px #000;
            padding: 4px 20px 4px 2px; /* 🌟 加上 20px 的右側防護罩 🌟 */
            line-height: 1.3; 
            overflow: visible;
        }
        .player-select option { color: #000; background: #fff; }

        .jersey-num { 
            font-family: 'Oswald', sans-serif; 
            font-size: 24px; 
            color: #B388FF; font-style: italic; 
            opacity: 0; transition: 0.3s; 
            width: 45px; 
            text-align: left;
            margin-left: 0; 
        }
        .jersey-num.active { opacity: 1; }

        .reserves-section { background: rgba(0,0,0,0.3); padding: 10px 10px; border-radius: 8px; border-left: 2px solid rgba(255,255,255,0.2); height: 100%; box-sizing: border-box; }
        
        .reserves-title { color: #B89947; font-size: 14px; margin-bottom: 8px; font-weight: bold; letter-spacing: 2px; border-left: 3px solid #B89947; padding-left: 8px; }
        
        .reserves-list { display: flex; flex-direction: column; gap: 7px; }
        
        .reserve-row { display: flex; align-items: center; width: 100%; gap: 12px; justify-content: flex-start;} 
        /* 🌟 預備球員也稍微放寬，確保加上 Padding 後依然裝得下 🌟 */
        .reserve-row .player-select { font-size: 24px; width: 125px; text-align: left;} 
        .reserve-row .jersey-num { font-size: 24px; width: 35px; text-align: left;} 
        .reserve-row .order-num { font-size: 24px; color: #888; width: 25px; text-align: center; text-shadow: none;}

        .btn-group { display: flex; gap: 12px; margin-top: 8px;}
        button { font-size: 16px; padding: 10px 20px; font-weight: bold; color: #fff; border: none; border-radius: 8px; cursor: pointer; background: #4A148C; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        button:hover { background: #673AB7; transform: translateY(-2px); }
        #share-line-btn { background: #06C755; }
    </style>
</head>
<body>

<div id="capture-area">
    <div class="left-panel">
        <img
