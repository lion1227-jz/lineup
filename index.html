<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JZ BASEBALL TEAM - STARTING LINEUP V7</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');

        body { font-family: '微軟正黑體', Arial, sans-serif; background: #111; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start; min-height: 100vh; color: #fff; }

        /* 🌟 改為 height: auto，讓圖框自動貼合內容，消除底部多餘黑邊 🌟 */
        #capture-area {
            width: 1080px; height: auto; 
            background-color: #000;
            display: flex; position: relative; overflow: visible;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }

        .left-panel { 
            width: 60%; padding: 25px 20px 30px 25px; z-index: 10; 
            background: linear-gradient(to right, #001529 90%, transparent);
            display: flex; flex-direction: column; 
        }

        /* 右側會跟著左側的高度自動拉伸 */
        .right-panel { 
            width: 40%; 
            background-image: url('https://lh3.googleusercontent.com/d/1vNdTLpYSVeh6FwwGmErapoPO_NEDIg56'); 
            background-size: cover; background-position: center;
            position: relative;
        }

        .vertical-text {
            position: absolute; top: 70px; right: 15px;
            font-family: 'Oswald', sans-serif; font-size: 16px; color: #B388FF;
            text-transform: uppercase; letter-spacing: 5px;
            writing-mode: vertical-rl; text-orientation: mixed;
            z-index: 15; text-shadow: 1px 1px 2px #000;
        }

        .jz-logo {
            position: absolute; bottom: 20px; right: 20px;
            width: 150px; height: 150px;
            z-index: 20;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8));
        }

        .header-title { font-family: 'Oswald', sans-serif; font-size: 48px; font-style: italic; color: #fff; margin: 0; line-height: 1; letter-spacing: 2px; text-shadow: 4px 4px 0 #4A148C; }
        
        .game-info-grid { 
            display: grid; grid-template-columns: 1fr 1fr 1.25fr; 
            gap: 12px; margin-top: 10px; padding-bottom: 10px; 
            border-bottom: 2px solid rgba(255,255,255,0.3); margin-bottom: 15px; 
        }
        .info-cell { display: flex; align-items: center; gap: 8px; }
        .info-cell:nth-child(3n+2), .info-cell:nth-child(3n+3) {
            border-left: 2px solid rgba(255,255,255,0.2);
            padding-left: 10px;
        }
        
        .game-info-grid input, .game-info-grid select { 
            background: transparent; border: none; color: #00d4ff; font-size: 16px; font-weight: bold; outline: none; cursor: pointer; width: 100%;
        }

        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1) brightness(2);
            cursor: pointer; opacity: 1;
        }

        .roster-split {
            display: grid; grid-template-columns: 1fr 1fr 1.25fr; gap: 12px; flex: 1;
        }
        
        .starters-col { grid-column: 1 / span 2; display: flex; flex-direction: column; }
        .bench-col { grid-column: 3; display: flex; flex-direction: column; }

        .lineup-list { display: flex; flex-direction: column; gap: 7px; }
        .lineup-row { display: flex; align-items: center; gap: 8px; }
        
        .order-num { font-family: 'Oswald', sans-serif; font-size: 24px; font-style: italic; color: #fff; width: 30px; text-align: right; text-shadow: 2px 2px 0 #673AB7; }
        .sp-num { color: #B388FF; font-size: 20px;}

        .pos-box { background: #4A148C; color: #fff; font-family: 'Oswald', sans-serif; font-size: 16px; width: 38px; height: 26px; display: flex; justify-content: center; align-items: center; transform: skewX(-10deg); border-left: 3px solid #00d4ff; }
        .pos-box span { transform: skewX(10deg); }
        .pos-select-hidden { position: absolute; opacity: 0; width: 38px; height: 26px; cursor: pointer; z-index: 5; }

        .player-select { 
            appearance: none; background: transparent; border: none; 
            color: #fff; font-size: 24px; font-weight: bold; cursor: pointer; outline: none; 
            width: 160px; text-shadow: 2px 2px 4px #000;
        }
        .player-select option { color: #000; background: #fff; }

        .jersey-num { font-family: 'Oswald', sans-serif; font-size: 22px; color: #B388FF; font-style: italic; opacity: 0; transition: 0.3s; width: 35px; text-align: left; }
        .jersey-num.active { opacity: 1; }

        .reserves-section { background: rgba(0,0,0,0.3); padding: 10px 10px; border-radius: 8px; border-left: 2px solid rgba(255,255,255,0.2); height: 100%; box-sizing: border-box; }
        .reserves-title { color: #00d4ff; font-size: 14px; margin-bottom: 8px; font-weight: bold; letter-spacing: 2px; border-left: 3px solid #00d4ff; padding-left: 8px; }
        
        /* 🌟 預備球員字體全面放大至先發等級 🌟 */
        .reserves-list { display: flex; flex-direction: column; gap: 7px; }
        .reserve-row { display: flex; align-items: center; width: 100%; gap: 6px;}
        .reserve-row .player-select { font-size: 24px; width: 140px; } /* 放大字體 */
        .reserve-row .jersey-num { font-size: 22px; width: 35px; } /* 放大字體 */
        .reserve-row .order-num { font-size: 24px; color: #888; width: 25px; text-align: right; text-shadow: none;} /* 放大字體 */

        /* 🌟 按鈕區塊：移除 auto 推擠，直接緊貼先發名單 🌟 */
        .btn-group { display: flex; gap: 12px; margin-top: 20px;}
        button { font-size: 16px; padding: 10px 20px; font-weight: bold; color: #fff; border: none; border-radius: 8px; cursor: pointer; background: #4A148C; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        button:hover { background: #673AB7; transform: translateY(-2px); }
        #share-line-btn { background: #06C755; }
    </style>
</head>
<body>

<div id="capture-area">
    <div class="left-panel">
        <h1 class="header-title">STARTING LINEUP</h1>
        
        <div class="game-info-grid">
            <div class="info-cell"><input type="date" id="game-date"></div>
            <div class="info-cell"><input type="time" value="08:00" title="集合時間"></div>
            <div class="info-cell"><input type="time" value="09:00" title="比賽時間"></div>
            <div class="info-cell"><select id="game-location"><option value="">選擇球場...</option></select></div>
            <div class="info-cell">
                <select id="bench-side">
                    <option value="">休息區</option>
                    <option value="一壘側">一壘側</option>
                    <option value="三壘側">三壘側</option>
                </select>
            </div>
            <div class="info-cell"><input type="text" placeholder="輸入對手名稱..." style="width:100%;"></div>
        </div>

        <div class="roster-split">
            <div class="starters-col">
                <div class="lineup-list" id="starters-board"></div>
                
                <div class="lineup-list" style="margin-top: 10px;">
                    <div class="lineup-row" id="sp-row">
                        <div class="order-num sp-num">SP</div>
                        <div style="position:relative;">
                            <select class="pos-select-hidden" disabled><option value="P">P</option></select>
                            <div class="pos-box"><span>P</span></div>
                        </div>
                        <select class="player-select"><option value="">-- 先發投手 --</option></select>
                        <div class="jersey-num"></div>
                    </div>
                </div>

                <div class="btn-group">
                    <button id="export-btn">📸 下載圖檔</button>
                    <button id="share-line-btn">🟢 分享至 LINE</button>
                </div>
            </div>

            <div class="bench-col">
                <div class="reserves-section">
                    <div class="reserves-title">預備球員</div>
                    <div class="reserves-list" id="reserves-board"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="vertical-text">JZ Baseball Team</div>
        <img class="jz-logo" src="https://lh3.googleusercontent.com/d/1aooCsOuMMtwMhT5bay4kDQCAq9sbm3kW" alt="JZ Logo" crossorigin="anonymous">
    </div>
</div>

<script>
    document.getElementById('game-date').value = new Date().toISOString().split('T')[0];

    const GOOGLE_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQE8qU7MUo8mltMrnQSLttK1ePGuN2ooTaD3QBtoKsmvrW5tEKOjSXwGm9bwhZtgy2veLF-QLTpe33q/pub?output=csv";
    let playersData = [];
    const posList = ["C", "1B", "2B", "3B", "SS", "LF", "CF", "RF", "DH"];

    function validateForm() {
        const pSelects = Array.from(document.querySelectorAll('.player-select'));
        const pValues = pSelects.map(s => s.value).filter(v => v !== "");
        pSelects.forEach(select => {
            if (select.value === "") select.style.color = "#fff";
            else {
                const count = pValues.filter(v => v === select.value).length;
                select.style.color = count > 1 ? "#FF3B30" : "#fff";
            }
        });
    }

    function createRow(index, type, container) {
        const row = document.createElement('div');
        row.className = type === 'reserve' ? 'reserve-row' : 'lineup-row';
        let numHtml = '';

        if (type === 'starter') {
            numHtml = `<div class="order-num">${index}</div>
                <div style="position:relative;">
                    <select class="pos-select-hidden"></select>
                    <div class="pos-box"><span>-</span></div>
                </div>`;
        } else if (type === 'reserve') {
            numHtml = `<div class="order-num">${index}</div>`;
        }

        row.innerHTML = `
            ${numHtml}
            <select class="player-select"><option value="">-- 球員 --</option></select>
            <div class="jersey-num"></div>
        `;

        const pSelect = row.querySelector('.player-select');
        const posHidden = row.querySelector('.pos-select-hidden');
        const posText = row.querySelector('.pos-box span');
        const jerseyNum = row.querySelector('.jersey-num');

        if (type === 'starter') {
            posHidden.addEventListener('change', (e) => { posText.textContent = e.target.value || '-'; });
        }
        
        pSelect.addEventListener('change', () => {
            const p = playersData.find(x => x.name === pSelect.value);
            if (p && p.num) {
                jerseyNum.textContent = '#' + p.num;
                jerseyNum.classList.add('active');
            } else {
                jerseyNum.textContent = '';
                jerseyNum.classList.remove('active');
            }
            validateForm();
        });

        if (type === 'starter') {
            posHidden.innerHTML = '<option value="">位</option>' + posList.map(pos => `<option value="${pos}">${pos}</option>`).join('');
        }

        container.appendChild(row);
    }

    function setupPitcherJersey() {
        const pRow = document.getElementById('sp-row');
        const pSelect = pRow.querySelector('.player-select');
        const jerseyNum = pRow.querySelector('.jersey-num');

        pSelect.addEventListener('change', () => {
            const p = playersData.find(x => x.name === pSelect.value);
            if (p && p.num) {
                jerseyNum.textContent = '#' + p.num;
                jerseyNum.classList.add('active');
            } else {
                jerseyNum.textContent = '';
                jerseyNum.classList.remove('active');
            }
            validateForm();
        });
    }

    for (let i = 1; i <= 9; i++) createRow(i, 'starter', document.getElementById('starters-board'));
    setupPitcherJersey();
    for (let i = 1; i <= 8; i++) createRow(i, 'reserve', document.getElementById('reserves-board'));

    Papa.parse(GOOGLE_SHEET_URL, {
        download: true,
        header: false,
        complete: function(results) {
            const data = results.data.slice(1);
            playersData = data.map(row => ({ 
                num: String(row[0]||"").trim(), 
                name: String(row[1]||"").trim() 
            })).filter(p => p.name !== "");
            
            const locations = Array.from(new Set(data.map(row => String(row[2]||"").trim()))).filter(loc => loc !== "");

            document.getElementById('game-location').innerHTML = '<option value="">選擇球場...</option>' + locations.map(loc => `<option value="${loc}">${loc}</option>`).join('');
            
            document.querySelectorAll('.player-select').forEach(select => {
                playersData.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.name; opt.textContent = p.name;
                    select.appendChild(opt);
                });
            });
        }
    });

    async function handleShare() {
        const btnGroup = document.querySelector('.btn-group');
        btnGroup.style.opacity = '0'; 
        await new Promise(r => setTimeout(r, 100));
        
        const canvas = await html2canvas(document.getElementById('capture-area'), { scale: 2, useCORS: true, backgroundColor: null });
        btnGroup.style.opacity = '1'; 

        canvas.toBlob(async (blob) => {
            const file = new File([blob], 'JZ_StartingLineup.png', { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) navigator.share({ files: [file] });
            else { const link = document.createElement('a'); link.download = 'JZ_StartingLineup.png'; link.href = URL.createObjectURL(blob); link.click(); }
        });
    }

    document.getElementById('export-btn').onclick = handleShare;
    document.getElementById('share-line-btn').onclick = handleShare;
</script>
</body>
</html>
